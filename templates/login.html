<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoNews Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { max-width: 400px; width: 100%; text-align: center; }
        .login-box h2 { margin-bottom: 2rem; font-size: 2rem; }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="glass-panel login-box">
        <h2>🔒 Acesso Restrito</h2>
        {% if error %}
            <p style="color: var(--danger); margin-bottom: 1rem;">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <div class="input-group">
                <input type="password" name="password" placeholder="Digite sua senha de Administrador" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%">Entrar</button>
        </form>
    </div>
</body>
</html>
